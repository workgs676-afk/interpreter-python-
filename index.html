<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Python Interpreter</title>
  <style>
    :root {
      --bg: #090d18;
      --panel: #111827;
      --ink: #dbeafe;
      --muted: #94a3b8;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #334155;
      --error: #fca5a5;
      --ok: #e2e8f0;
      --editor-bg: #0b1220;
      --output-bg: #0f172a;
      --tok-keyword: #93c5fd;
      --tok-string: #86efac;
      --tok-number: #f9a8d4;
      --tok-operator: #fcd34d;
      --tok-comment: #64748b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Consolas, "Courier New", monospace;
      background: radial-gradient(circle at 20% 0%, #1e293b 0%, #090d18 45%, #030712 100%);
      color: var(--ink);
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 22px 44px rgba(2, 6, 23, 0.55);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: #0b1220;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      color: #ffffff;
      background: var(--accent);
      transition: background 0.15s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 520px;
    }

    .panel {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel + .panel {
      border-left: 1px solid var(--border);
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 700;
    }

    .editor-wrap {
      position: relative;
      width: 100%;
      min-height: 450px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--editor-bg);
      overflow: hidden;
    }

    .code-highlight,
    .code-input {
      margin: 0;
      width: 100%;
      min-height: 450px;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre;
      tab-size: 4;
      overflow: auto;
    }

    .code-highlight {
      color: var(--ink);
      pointer-events: none;
    }

    .code-input {
      position: absolute;
      inset: 0;
      border: 0;
      resize: none;
      color: transparent;
      caret-color: #f8fafc;
      background: transparent;
      outline: none;
    }

    .code-input:focus {
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.45);
    }

    .code-input::selection {
      background: rgba(148, 163, 184, 0.35);
    }

    .output {
      min-height: 450px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: var(--output-bg);
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 14px;
      color: var(--ok);
      overflow: auto;
    }

    .output.error {
      color: var(--error);
      border-color: rgba(248, 113, 113, 0.5);
      background: #261115;
    }

    .tok-keyword {
      color: var(--tok-keyword);
      font-weight: 700;
    }

    .tok-string {
      color: var(--tok-string);
    }

    .tok-number {
      color: var(--tok-number);
    }

    .tok-operator {
      color: var(--tok-operator);
    }

    .tok-comment {
      color: var(--tok-comment);
      font-style: italic;
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .panel + .panel {
        border-left: 0;
        border-top: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <div class="title">Mini Python Interpreter (Educational)</div>
      <button id="runBtn">Run</button>
    </div>
    <div class="layout">
      <section class="panel">
        <div class="label">Code</div>
        <div class="editor-wrap">
          <pre id="codeHighlight" class="code-highlight" aria-hidden="true"></pre>
          <textarea id="codeInput" class="code-input" spellcheck="false">x = 5
while x > 0:
    print(x)
    x = x - 1

name = "done"
if x == 0:
    print(name)</textarea>
        </div>
      </section>
      <section class="panel">
        <div class="label">Output</div>
        <div id="output" class="output">Press Run to execute.</div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      function makeError(type, message, line) {
        return {
          error: true,
          type: type,
          message: message,
          line: typeof line === "number" ? line : 0
        };
      }

      class Lexer {
        constructor(source) {
          this.source = source.replace(/\r\n/g, "\n");
          this.tokens = [];
          this.indentStack = [0];
        }

        tokenize() {
          const lines = this.source.split("\n");

          for (let i = 0; i < lines.length; i++) {
            const lineNumber = i + 1;
            const raw = lines[i];
            const line = raw.replace(/\t/g, "    ");
            const withoutComment = this.stripComment(line);
            if (withoutComment.trim() === "") {
              continue;
            }

            const indentMatch = withoutComment.match(/^ */);
            const indent = indentMatch ? indentMatch[0].length : 0;
            this.handleIndent(indent, lineNumber);
            this.lexLine(withoutComment.slice(indent), lineNumber);
            this.tokens.push({ type: "NEWLINE", line: lineNumber });
          }

          while (this.indentStack.length > 1) {
            this.indentStack.pop();
            this.tokens.push({ type: "DEDENT", line: lines.length || 1 });
          }
          this.tokens.push({ type: "EOF", line: lines.length || 1 });
          return this.tokens;
        }

        stripComment(line) {
          let inString = false;
          let quote = "";
          let escaped = false;
          for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (inString) {
              if (!escaped && ch === quote) {
                inString = false;
                quote = "";
              }
              escaped = !escaped && ch === "\\";
              continue;
            }
            if (ch === "'" || ch === '"') {
              inString = true;
              quote = ch;
              escaped = false;
              continue;
            }
            if (ch === "#") {
              return line.slice(0, i);
            }
          }
          return line;
        }

        handleIndent(indent, line) {
          const current = this.indentStack[this.indentStack.length - 1];
          if (indent > current) {
            this.indentStack.push(indent);
            this.tokens.push({ type: "INDENT", line: line });
            return;
          }
          if (indent < current) {
            while (this.indentStack.length > 1 && indent < this.indentStack[this.indentStack.length - 1]) {
              this.indentStack.pop();
              this.tokens.push({ type: "DEDENT", line: line });
            }
            if (indent !== this.indentStack[this.indentStack.length - 1]) {
              throw makeError("SyntaxError", "Inconsistent indentation", line);
            }
          }
        }

        lexLine(text, line) {
          let i = 0;
          while (i < text.length) {
            const ch = text[i];

            if (ch === " ") {
              i++;
              continue;
            }

            if (/[0-9]/.test(ch)) {
              let start = i;
              while (i < text.length && /[0-9]/.test(text[i])) i++;
              if (text[i] === ".") {
                i++;
                while (i < text.length && /[0-9]/.test(text[i])) i++;
              }
              const raw = text.slice(start, i);
              this.tokens.push({ type: "NUMBER", value: Number(raw), line: line });
              continue;
            }

            if (ch === "'" || ch === '"') {
              const quote = ch;
              i++;
              let value = "";
              let escaped = false;
              while (i < text.length) {
                const c = text[i];
                if (!escaped && c === quote) {
                  i++;
                  break;
                }
                if (!escaped && c === "\\") {
                  escaped = true;
                  i++;
                  continue;
                }
                if (escaped) {
                  if (c === "n") value += "\n";
                  else if (c === "t") value += "\t";
                  else value += c;
                  escaped = false;
                  i++;
                  continue;
                }
                value += c;
                i++;
              }
              if (i > text.length || text[i - 1] !== quote) {
                throw makeError("SyntaxError", "Unterminated string literal", line);
              }
              this.tokens.push({ type: "STRING", value: value, line: line });
              continue;
            }

            if (/[A-Za-z_]/.test(ch)) {
              let start = i;
              while (i < text.length && /[A-Za-z0-9_]/.test(text[i])) i++;
              const word = text.slice(start, i);
              if (word === "if" || word === "while" || word === "print") {
                this.tokens.push({ type: "KEYWORD", value: word, line: line });
              } else {
                this.tokens.push({ type: "IDENT", value: word, line: line });
              }
              continue;
            }

            const twoChar = text.slice(i, i + 2);
            if (["==", "!=", ">=", "<="].includes(twoChar)) {
              this.tokens.push({ type: "OP", value: twoChar, line: line });
              i += 2;
              continue;
            }

            if (["+", "-", "*", "/", ">", "<", "="].includes(ch)) {
              this.tokens.push({ type: "OP", value: ch, line: line });
              i++;
              continue;
            }

            if (ch === ":") {
              this.tokens.push({ type: "COLON", value: ":", line: line });
              i++;
              continue;
            }

            if (ch === "(" || ch === ")") {
              this.tokens.push({ type: "PAREN", value: ch, line: line });
              i++;
              continue;
            }

            throw makeError("SyntaxError", "Unexpected character '" + ch + "'", line);
          }
        }
      }

      class Parser {
        constructor(tokens) {
          this.tokens = tokens;
          this.current = 0;
        }

        parse() {
          const body = [];
          while (!this.isAtEnd()) {
            if (this.match("NEWLINE")) continue;
            if (this.check("EOF")) break;
            body.push(this.statement());
          }
          return { type: "Program", body: body };
        }

        statement() {
          if (this.checkKeyword("if")) return this.ifStatement();
          if (this.checkKeyword("while")) return this.whileStatement();
          if (this.checkKeyword("print")) return this.printStatement();
          if (this.check("IDENT")) return this.assignment();
          const tok = this.peek();
          throw makeError("SyntaxError", "Unexpected token in statement", tok.line);
        }

        assignment() {
          const ident = this.consume("IDENT", "Expected variable name");
          const line = ident.line;
          this.consumeOp("=", "Expected '=' in assignment");
          const value = this.expression();
          this.consume("NEWLINE", "Expected newline after assignment");
          return { type: "Assign", name: ident.value, value: value, line: line };
        }

        printStatement() {
          const kw = this.consumeKeyword("print", "Expected 'print'");
          this.consumeParen("(", "Expected '(' after print");
          const expr = this.expression();
          this.consumeParen(")", "Expected ')' after expression");
          this.consume("NEWLINE", "Expected newline after print");
          return { type: "Print", expression: expr, line: kw.line };
        }

        ifStatement() {
          const kw = this.consumeKeyword("if", "Expected 'if'");
          const condition = this.expression();
          this.consume("COLON", "Expected ':' after if condition");
          this.consume("NEWLINE", "Expected newline after ':'");
          const body = this.block();
          return { type: "If", condition: condition, body: body, line: kw.line };
        }

        whileStatement() {
          const kw = this.consumeKeyword("while", "Expected 'while'");
          const condition = this.expression();
          this.consume("COLON", "Expected ':' after while condition");
          this.consume("NEWLINE", "Expected newline after ':'");
          const body = this.block();
          return { type: "While", condition: condition, body: body, line: kw.line };
        }

        block() {
          this.consume("INDENT", "Expected indented block");
          const body = [];
          while (!this.check("DEDENT") && !this.check("EOF")) {
            if (this.match("NEWLINE")) continue;
            body.push(this.statement());
          }
          this.consume("DEDENT", "Expected end of block");
          return body;
        }

        expression() {
          return this.comparison();
        }

        comparison() {
          let expr = this.term();
          while (this.matchOp(">", "<", ">=", "<=", "==", "!=")) {
            const op = this.previous();
            const right = this.term();
            expr = { type: "Binary", operator: op.value, left: expr, right: right, line: op.line };
          }
          return expr;
        }

        term() {
          let expr = this.factor();
          while (this.matchOp("+", "-")) {
            const op = this.previous();
            const right = this.factor();
            expr = { type: "Binary", operator: op.value, left: expr, right: right, line: op.line };
          }
          return expr;
        }

        factor() {
          let expr = this.unary();
          while (this.matchOp("*", "/")) {
            const op = this.previous();
            const right = this.unary();
            expr = { type: "Binary", operator: op.value, left: expr, right: right, line: op.line };
          }
          return expr;
        }

        unary() {
          if (this.matchOp("-", "+")) {
            const op = this.previous();
            const right = this.unary();
            return { type: "Unary", operator: op.value, expression: right, line: op.line };
          }
          return this.primary();
        }

        primary() {
          if (this.match("NUMBER")) {
            const tok = this.previous();
            return { type: "Literal", value: tok.value, line: tok.line };
          }
          if (this.match("STRING")) {
            const tok = this.previous();
            return { type: "Literal", value: tok.value, line: tok.line };
          }
          if (this.match("IDENT")) {
            const tok = this.previous();
            return { type: "Identifier", name: tok.value, line: tok.line };
          }
          if (this.matchParen("(")) {
            const expr = this.expression();
            this.consumeParen(")", "Expected ')' after expression");
            return expr;
          }
          const tok = this.peek();
          throw makeError("SyntaxError", "Expected expression", tok.line);
        }

        match(type) {
          if (this.check(type)) {
            this.advance();
            return true;
          }
          return false;
        }

        matchOp() {
          const allowed = Array.from(arguments);
          if (this.check("OP") && allowed.includes(this.peek().value)) {
            this.advance();
            return true;
          }
          return false;
        }

        matchParen(value) {
          if (this.check("PAREN") && this.peek().value === value) {
            this.advance();
            return true;
          }
          return false;
        }

        check(type) {
          if (this.isAtEnd()) return type === "EOF";
          return this.peek().type === type;
        }

        checkKeyword(value) {
          return this.check("KEYWORD") && this.peek().value === value;
        }

        consume(type, message) {
          if (this.check(type)) return this.advance();
          const tok = this.peek();
          throw makeError("SyntaxError", message, tok.line);
        }

        consumeOp(value, message) {
          if (this.check("OP") && this.peek().value === value) return this.advance();
          const tok = this.peek();
          throw makeError("SyntaxError", message, tok.line);
        }

        consumeParen(value, message) {
          if (this.check("PAREN") && this.peek().value === value) return this.advance();
          const tok = this.peek();
          throw makeError("SyntaxError", message, tok.line);
        }

        consumeKeyword(value, message) {
          if (this.check("KEYWORD") && this.peek().value === value) return this.advance();
          const tok = this.peek();
          throw makeError("SyntaxError", message, tok.line);
        }

        isAtEnd() {
          return this.peek().type === "EOF";
        }

        peek() {
          return this.tokens[this.current];
        }

        previous() {
          return this.tokens[this.current - 1];
        }

        advance() {
          if (!this.isAtEnd()) this.current++;
          return this.previous();
        }
      }

      class Evaluator {
        constructor() {
          this.env = Object.create(null);
          this.output = [];
          this.steps = 0;
          this.maxSteps = 100000;
        }

        run(program) {
          this.executeBlock(program.body);
          return this.output;
        }

        executeBlock(statements) {
          for (const stmt of statements) {
            this.guard(stmt.line);
            this.execute(stmt);
          }
        }

        guard(line) {
          this.steps++;
          if (this.steps > this.maxSteps) {
            throw makeError("RuntimeError", "Execution limit exceeded (possible infinite loop)", line);
          }
        }

        execute(stmt) {
          if (stmt.type === "Assign") {
            this.env[stmt.name] = this.evalExpr(stmt.value);
            return;
          }

          if (stmt.type === "Print") {
            const value = this.evalExpr(stmt.expression);
            this.output.push(String(value));
            return;
          }

          if (stmt.type === "If") {
            if (this.isTruthy(this.evalExpr(stmt.condition))) {
              this.executeBlock(stmt.body);
            }
            return;
          }

          if (stmt.type === "While") {
            while (this.isTruthy(this.evalExpr(stmt.condition))) {
              this.guard(stmt.line);
              this.executeBlock(stmt.body);
            }
            return;
          }

          throw makeError("RuntimeError", "Unknown statement type: " + stmt.type, stmt.line);
        }

        evalExpr(expr) {
          if (expr.type === "Literal") {
            return expr.value;
          }

          if (expr.type === "Identifier") {
            if (!(expr.name in this.env)) {
              throw makeError("NameError", "Undefined variable '" + expr.name + "'", expr.line);
            }
            return this.env[expr.name];
          }

          if (expr.type === "Unary") {
            const value = this.evalExpr(expr.expression);
            if (expr.operator === "+") return +value;
            if (expr.operator === "-") return -value;
            throw makeError("RuntimeError", "Unsupported unary operator " + expr.operator, expr.line);
          }

          if (expr.type === "Binary") {
            const left = this.evalExpr(expr.left);
            const right = this.evalExpr(expr.right);

            switch (expr.operator) {
              case "+":
                return left + right;
              case "-":
                return left - right;
              case "*":
                return left * right;
              case "/":
                if (Number(right) === 0) {
                  throw makeError("RuntimeError", "Division by zero", expr.line);
                }
                return left / right;
              case ">":
                return left > right;
              case "<":
                return left < right;
              case ">=":
                return left >= right;
              case "<=":
                return left <= right;
              case "==":
                return left === right;
              case "!=":
                return left !== right;
              default:
                throw makeError("RuntimeError", "Unsupported operator " + expr.operator, expr.line);
            }
          }

          throw makeError("RuntimeError", "Unknown expression type: " + expr.type, expr.line);
        }

        isTruthy(value) {
          return !!value;
        }
      }

      function runProgram(source) {
        try {
          const lexer = new Lexer(source);
          const tokens = lexer.tokenize();
          const parser = new Parser(tokens);
          const ast = parser.parse();
          const evaluator = new Evaluator();
          const out = evaluator.run(ast);
          return {
            error: false,
            output: out.join("\n")
          };
        } catch (err) {
          if (err && err.error) return err;
          return makeError("RuntimeError", err && err.message ? err.message : "Unknown error", 0);
        }
      }

      const codeInput = document.getElementById("codeInput");
      const codeHighlight = document.getElementById("codeHighlight");
      const runBtn = document.getElementById("runBtn");
      const outputEl = document.getElementById("output");

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function highlightCode(source) {
        const keywords = new Set(["if", "while", "print"]);
        let i = 0;
        let html = "";

        while (i < source.length) {
          const ch = source[i];

          if (ch === "#") {
            const start = i;
            while (i < source.length && source[i] !== "\n") i++;
            html += '<span class="tok-comment">' + escapeHtml(source.slice(start, i)) + "</span>";
            continue;
          }

          if (ch === '"' || ch === "'") {
            const quote = ch;
            const start = i;
            i++;
            let escaped = false;
            while (i < source.length) {
              const c = source[i];
              if (!escaped && c === quote) {
                i++;
                break;
              }
              if (!escaped && c === "\\") {
                escaped = true;
                i++;
                continue;
              }
              escaped = false;
              i++;
            }
            html += '<span class="tok-string">' + escapeHtml(source.slice(start, i)) + "</span>";
            continue;
          }

          if (/[0-9]/.test(ch)) {
            const start = i;
            while (i < source.length && /[0-9]/.test(source[i])) i++;
            if (source[i] === ".") {
              i++;
              while (i < source.length && /[0-9]/.test(source[i])) i++;
            }
            html += '<span class="tok-number">' + escapeHtml(source.slice(start, i)) + "</span>";
            continue;
          }

          if (/[A-Za-z_]/.test(ch)) {
            const start = i;
            while (i < source.length && /[A-Za-z0-9_]/.test(source[i])) i++;
            const word = source.slice(start, i);
            if (keywords.has(word)) {
              html += '<span class="tok-keyword">' + word + "</span>";
            } else {
              html += escapeHtml(word);
            }
            continue;
          }

          const twoChar = source.slice(i, i + 2);
          if (["==", "!=", ">=", "<="].includes(twoChar)) {
            html += '<span class="tok-operator">' + escapeHtml(twoChar) + "</span>";
            i += 2;
            continue;
          }

          if (["+","-","*","/","=","<",">",":","(",")"].includes(ch)) {
            html += '<span class="tok-operator">' + escapeHtml(ch) + "</span>";
            i++;
            continue;
          }

          html += escapeHtml(ch);
          i++;
        }

        if (html === "") return " ";
        if (source.endsWith("\n")) return html + "\n";
        return html;
      }

      function syncEditorScroll() {
        codeHighlight.scrollTop = codeInput.scrollTop;
        codeHighlight.scrollLeft = codeInput.scrollLeft;
      }

      function refreshHighlight() {
        codeHighlight.innerHTML = highlightCode(codeInput.value);
        syncEditorScroll();
      }

      codeInput.addEventListener("input", refreshHighlight);
      codeInput.addEventListener("scroll", syncEditorScroll);
      codeInput.addEventListener("keydown", function (event) {
        if (event.key !== "Tab") return;
        event.preventDefault();
        const start = codeInput.selectionStart;
        const end = codeInput.selectionEnd;
        const value = codeInput.value;
        codeInput.value = value.slice(0, start) + "    " + value.slice(end);
        codeInput.selectionStart = codeInput.selectionEnd = start + 4;
        refreshHighlight();
      });

      function render(result) {
        if (result.error) {
          outputEl.classList.add("error");
          outputEl.textContent = JSON.stringify(result, null, 2);
          return;
        }
        outputEl.classList.remove("error");
        outputEl.textContent = result.output === "" ? "(no output)" : result.output;
      }

      runBtn.addEventListener("click", function () {
        const source = codeInput.value;
        const result = runProgram(source);
        render(result);
      });

      refreshHighlight();
    })();
  </script>
</body>
</html>
